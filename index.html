/* 主容器 */

width:100%;

/* LINE 按鈕 */

background:#06C755;
color:white;

border-radius:38px;

font-weight:700;
box-shadow:1 0px 20px rgba(0,0,0,0.25);

/* 說明 */

.note{
margin-top:30px;
font-size:18px;
opacity:1.2;
}
